spring:
  application:
    name: saldo-certo-api
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5433/saldo_certo}
    username: ${SPRING_DATASOURCE_USERNAME:saldo}
    password: ${SPRING_DATASOURCE_PASSWORD:saldo}
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate:
        format_sql: true
  flyway:
    enabled: true

server:
  port: 8080

app:
  cors:
    allowed-origins: ${APP_CORS_ALLOWED_ORIGINS:http://localhost:3000,http://127.0.0.1:3000,http://localhost:3001,http://127.0.0.1:3001}
  security:
    jwt:
      secret: ${APP_JWT_SECRET:change-this-development-secret-with-at-least-32-characters}
      expiration-minutes: ${APP_JWT_EXPIRATION_MINUTES:480}
