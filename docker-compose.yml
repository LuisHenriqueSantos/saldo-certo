services:
  postgres:
    image: postgres:16-alpine
    container_name: saldo-certo-postgres
    environment:
      POSTGRES_DB: saldo_certo
      POSTGRES_USER: saldo
      POSTGRES_PASSWORD: saldo
    ports:
      - "5433:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U saldo -d saldo_certo"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres-data:
